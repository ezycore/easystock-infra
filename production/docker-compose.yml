# Production app stack. Pulls images from GHCR, reads secrets from ./.env.*,
# joins the shared `edge` network so Caddy (infra/) can route to each container.
# Container names here MUST match the upstreams in infra/Caddyfile.
services:
  backend-prod:
    image: ghcr.io/sohoz360/easystock-backend:production
    container_name: backend-prod
    restart: unless-stopped
    env_file: ./.env.backend
    networks: [edge]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  mc-api-prod:
    image: ghcr.io/sohoz360/mission-control:production
    container_name: mc-api-prod
    restart: unless-stopped
    env_file: ./.env.mc-api
    networks: [edge]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:6000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend-prod:
    image: ghcr.io/sohoz360/easystock-frontend:production
    container_name: frontend-prod
    restart: unless-stopped
    env_file: ./.env.frontend
    networks: [edge]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  mc-admin-prod:
    image: ghcr.io/sohoz360/mission-control-admin:production
    container_name: mc-admin-prod
    restart: unless-stopped
    env_file: ./.env.mc-admin
    networks: [edge]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  edge:
    external: true
