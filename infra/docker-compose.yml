services:
  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # stores HTTPS certificates (persisted)
      - caddy_config:/config
    networks:
      - edge

networks:
  edge:
    external: true              # created once with: docker network create edge

volumes:
  caddy_data:
  caddy_config:
