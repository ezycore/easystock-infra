# Staging app stack. Identical to production except :staging image tags and
# *-staging container names (which match the staging upstreams in infra/Caddyfile).
services:
  backend-staging:
    image: ghcr.io/sohoz360/easystock-backend:staging
    container_name: backend-staging
    restart: unless-stopped
    env_file: ./.env.backend
    networks: [edge]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  mc-api-staging:
    image: ghcr.io/sohoz360/mission-control:staging
    container_name: mc-api-staging
    restart: unless-stopped
    env_file: ./.env.mc-api
    networks: [edge]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:6000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend-staging:
    image: ghcr.io/sohoz360/easystock-frontend:staging
    container_name: frontend-staging
    restart: unless-stopped
    env_file: ./.env.frontend
    networks: [edge]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  mc-admin-staging:
    image: ghcr.io/sohoz360/mission-control-admin:staging
    container_name: mc-admin-staging
    restart: unless-stopped
    env_file: ./.env.mc-admin
    networks: [edge]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  edge:
    external: true
