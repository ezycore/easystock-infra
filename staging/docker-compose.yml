# Staging app stack. Identical to production except :staging image tags and
# *-staging container names (which match the staging upstreams in infra/Caddyfile).
services:
  backend-staging:
    image: ghcr.io/ezycore/easystock-backend:staging
    container_name: backend-staging
    restart: unless-stopped
    env_file: ./.env.backend
    networks: [edge]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health',r=>process.exit(r.statusCode>=200&&r.statusCode<300?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  mc-api-staging:
    image: ghcr.io/ezycore/mission-control:staging
    container_name: mc-api-staging
    restart: unless-stopped
    env_file: ./.env.mc-api
    networks: [edge]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:6000/health',r=>process.exit(r.statusCode>=200&&r.statusCode<300?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend-staging:
    image: ghcr.io/ezycore/easystock-frontend:staging
    container_name: frontend-staging
    restart: unless-stopped
    env_file: ./.env.frontend
    networks: [edge]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  mc-admin-staging:
    image: ghcr.io/ezycore/mission-control-admin:staging
    container_name: mc-admin-staging
    restart: unless-stopped
    env_file: ./.env.mc-admin
    networks: [edge]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  edge:
    external: true
